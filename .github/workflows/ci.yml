name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  compile-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate project metadata
        run: python -c "from pathlib import Path; assert Path('pyproject.toml').exists()"

      - name: Compile Python sources
        run: python -m compileall app core ml mcp_app
